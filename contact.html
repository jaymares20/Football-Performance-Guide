<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact the College Football Training and Performance Guide by submitting a question or feedback through our contact form.">
    <title>Contact | College Football Training & Performance Guide</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>College Football Training & Performance Guide</h1>

        <nav aria-label="Main navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="training.html">Training</a>
            <a href="nutrition.html">Nutrition</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>

        <section class="about-section">
            <h2>Contact</h2>

            <p>
                Have a question or feedback about the College Football Training
                & Performance Guide? Complete the form below.
            </p>

            <form id="contact-form">

                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="topic">Topic:</label>
                    <select id="topic" name="topic">
                        <option value="training">Training</option>
                        <option value="nutrition">Nutrition</option>
                        <option value="performance">Performance</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <button type="submit">Submit</button>

            </form>

            <p id="form-response" role="status" aria-live="polite"></p>

        </section>

    </main>

    <footer>
        <p>College Football Training & Performance Guide</p>

        <nav aria-label="Footer navigation">
            <a href="index.html">Home</a> |
            <a href="about.html">About</a> |
            <a href="training.html">Training</a> |
            <a href="nutrition.html">Nutrition</a> |
            <a href="contact.html">Contact</a>
        </nav>
    </footer>

    <script src="script.js"></script>

</body>

</html>
